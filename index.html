<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setoran WiFi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Poppins;background:linear-gradient(135deg,#4f46e5,#22c55e);margin:0;padding:15px}
.container{background:white;border-radius:15px;padding:15px}

form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}

input{padding:6px;border-radius:6px;border:1px solid #ddd}
button{padding:6px 8px;border:none;border-radius:6px;color:white;cursor:pointer}

.btn-add{background:#4f46e5}
.btn-edit{background:#f59e0b}
.btn-delete{background:#ef4444}
.btn-export{background:#16a34a}

.table-wrap{overflow-x:auto}

table{width:100%;min-width:900px;border-collapse:collapse}

th,td{padding:5px;text-align:center;font-size:12px}

th{background:#4f46e5;color:white;position:sticky;top:0}

input[type=number]{width:45px;padding:3px;font-size:11px}

.btn-edit,.btn-delete{font-size:11px;padding:4px 6px}

@media(max-width:768px){
  th,td{font-size:10px}
  input[type=number]{width:40px}
}
</style>
</head>
<body>

<div class="container">
<h2>📶 Setoran WiFi (Excel + Firebase)</h2>

<form id="form">
<input type="text" id="nama" placeholder="Nama" required style="width:120px">
<input type="number" id="tahun" placeholder="Tahun" style="width:90px" required>
<button type="submit" class="btn-add">Tambah</button>
<button type="button" class="btn-export" onclick="exportExcel()">Download Excel</button>
</form>

<div class="table-wrap">
<table id="tabel">
<thead>
<tr>
<th>Nama</th><th>Tahun</th>
<th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th>
<th>Mei</th><th>Jun</th><th>Jul</th><th>Agu</th>
<th>Sep</th><th>Okt</th><th>Nov</th><th>Des</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const firebaseConfig={
  apiKey: "AIzaSyB5trvS_TLuwIYA14VZfogHwj9dCZjAitA",
  authDomain: "setoran-wifi.firebaseapp.com",
  projectId: "setoran-wifi",
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const form=document.getElementById('form');
const tbody=document.getElementById('tbody');

function listen(){
 db.collection('setoran').onSnapshot(snap=>{
  tbody.innerHTML='';
  snap.forEach(doc=>render(doc.id,doc.data()));
 });
}

form.addEventListener('submit',e=>{
 e.preventDefault();

 const nama=document.getElementById('nama').value;
 const tahun=document.getElementById('tahun').value;

 db.collection('setoran').add({
  nama,tahun,bulan:Array(12).fill(0)
 });

 form.reset();
});

function render(id,data){
 const tr=document.createElement('tr');

 let html=`<td>${data.nama}</td><td>${data.tahun}</td>`;

 data.bulan.forEach(v=>{
  html+=`<td><input type="number" value="${v}" disabled></td>`;
 });

 html+=`<td>
 <button class="btn-edit">Edit</button>
 <button class="btn-delete">Hapus</button>
 </td>`;

 tr.innerHTML=html;

 const btnEdit=tr.querySelector('.btn-edit');
 const btnDelete=tr.querySelector('.btn-delete');

 let edit=false;

 btnEdit.onclick=()=>{
  const inputs=tr.querySelectorAll('input');
  edit=!edit;

  inputs.forEach(i=>i.disabled=!edit);
  btnEdit.textContent=edit?'Simpan':'Edit';

  if(!edit){
    const values=Array.from(inputs).map(i=>Number(i.value)||0);
    db.collection('setoran').doc(id).update({bulan:values});
  }
 };

 btnDelete.onclick=()=>{
  if(confirm('Hapus data?')){
    db.collection('setoran').doc(id).delete();
  }
 };

 tbody.appendChild(tr);
}

// 🔥 EXPORT EXCEL
function exportExcel(){
 let table=document.getElementById("tabel");
 let html=table.outerHTML.replace(/<input[^>]*>/gi,function(match){
  let value=match.match(/value="(.*?)"/);
  return value?value[1]:'';
 });

 let url='data:application/vnd.ms-excel,'+encodeURIComponent(html);
 let a=document.createElement('a');
 a.href=url;
 a.download='laporan_wifi.xls';
 a.click();
}

listen();
</script>

</body>
</html>
